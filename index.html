<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sequência — Angry Birds</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;user-select:none}
.game{width:100vw;max-width:600px;min-height:100dvh;background:linear-gradient(180deg,#1a1a2e,#16213e,#0f3460);display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:6px 12px;color:#888;font-size:clamp(12px,2.5vw,14px);flex-shrink:0}
.header .score{color:#f1c40f;font-weight:700}
.header .round{color:#4ecca3}
.pattern-label{text-align:center;color:#f1c40f;font-size:clamp(14px,3vw,18px);font-weight:600;padding:2px;letter-spacing:4px;flex-shrink:0}
.seq-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:6px;gap:6px}
.seq-row{display:flex;gap:clamp(4px,1.5vw,10px);flex-wrap:wrap;justify-content:center}
.seq-card{width:clamp(55px,14vw,85px);height:clamp(75px,18vw,110px);background:#2d2d4e;border:3px solid #555;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:4px 4px 2px;transition:all 0.3s}
.seq-card .char-img{width:clamp(40px,10vw,65px);height:clamp(40px,10vw,65px);object-fit:contain}
.seq-card .idx-label{font-size:clamp(9px,2vw,11px);color:#666;margin-top:2px}
.seq-card.filled{border-color:#4ecca3;background:rgba(78,204,163,0.1)}
.seq-card.next{border-color:#f1c40f;border-style:dashed;background:rgba(241,196,15,0.05);animation:pulse 1.5s ease infinite}
.seq-card.next .next-mark{position:absolute;top:4px;font-size:clamp(10px,2vw,13px);color:#f1c40f;font-weight:700}
.seq-card.correct{border-color:#4ecca3;animation:pop 0.4s}
.seq-card.wrong{border-color:#e74c3c;animation:shake 0.35s}
@keyframes pulse{0%,100%{border-color:#f1c40f}50%{border-color:#f39c12}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.12)}100%{transform:scale(1)}}

.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,1.5vw,10px);padding:8px 12px 12px;flex-shrink:0}
.choice-btn{background:#2d2d4e;border:3px solid #555;border-radius:12px;padding:6px 4px 2px;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center}
.choice-btn:hover{border-color:#4ecca3;transform:scale(1.05)}
.choice-btn .char-img{width:clamp(35px,9vw,55px);height:clamp(35px,9vw,55px);object-fit:contain}
.choice-btn .ch-name{font-size:clamp(8px,1.8vw,10px);color:#aaa;margin-top:2px}
.choice-btn.correct{border-color:#4ecca3;background:rgba(78,204,163,0.2)}
.choice-btn.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.2);animation:shake 0.35s}
.choice-btn:disabled{opacity:0.5;pointer-events:none}

.feedback{text-align:center;min-height:clamp(20px,4vw,30px);font-size:clamp(14px,3vw,18px);font-weight:600;padding:2px 12px;flex-shrink:0}
.feedback.ok{color:#4ecca3}.feedback.fail{color:#e74c3c}

.win-overlay{position:absolute;inset:0;z-index:200;background:rgba(15,52,96,0.93);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:30px;text-align:center}
.win-overlay.active{opacity:1;pointer-events:all}
.win-overlay h2{font-size:clamp(28px,7vw,42px);color:#4ecca3;margin-bottom:4px}
.win-overlay .big{font-size:clamp(60px,16vw,100px);margin:10px 0}
.win-overlay button{padding:12px 36px;font-size:clamp(14px,3vw,18px);font-weight:700;background:#4ecca3;color:#1a1a2e;border:none;border-radius:12px;cursor:pointer;margin-top:12px}
.start-overlay{position:absolute;inset:0;z-index:300;background:rgba(15,52,96,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;transition:opacity 0.5s}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-overlay .logo{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.start-overlay .logo img{width:clamp(35px,9vw,55px);height:clamp(35px,9vw,55px)}
.start-overlay h1{color:#4ecca3;font-size:clamp(22px,6vw,36px);margin-bottom:4px}
.start-overlay p{color:#aaa;font-size:clamp(13px,3vw,16px);margin-bottom:20px}
.start-overlay .start-btn{padding:16px 48px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#e74c3c,#c0392b);color:#fff;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:250}
.conf{position:absolute;border-radius:2px;animation:confFall linear forwards}
@keyframes confFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <span>🐦 Sequência</span>
    <span class="round" id="roundDisplay">Ronda 1/8</span>
    <span class="score" id="scoreDisplay">0 ✅</span>
  </div>
  <div class="pattern-label" id="patternLabel"></div>
  
  <div class="seq-area" id="seqArea">
    <div class="seq-row" id="seqRow"></div>
    <div style="color:#888;font-size:clamp(11px,2.5vw,13px);margin-top:2px">O que vem a seguir?</div>
  </div>
  
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  
  <div class="win-overlay" id="winOverlay">
    <h2>🏆 Parabéns!</h2>
    <div class="big">🐦🐷</div>
    <div style="color:#aaa;font-size:clamp(14px,3vw,18px);margin:8px 0">Completaste todas as sequências!</div>
    <button onclick="restartGame()">Jogar outra vez →</button>
  </div>
  
  <div class="start-overlay" id="startOverlay">
    <div class="logo">
      <img src="assets/red_bird.png" alt=""><span>+</span><img src="assets/green_pig.png" alt="">
    </div>
    <h1>Sequência</h1>
    <p>Descobre o padrão! O que vem a seguir?</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>
  </div>
</div>

<script>
const ALL_CHARS = [
  {file:'red_bird.png',name:'Red',type:'bird'},
  {file:'blue_bird.png',name:'Blues',type:'bird'},
  {file:'yellow_bird.png',name:'Chuck',type:'bird'},
  {file:'black_bird.png',name:'Bomb',type:'bird'},
  {file:'green_pig.png',name:'Porco',type:'pig'},
  {file:'king_pig.png',name:'Rei',type:'pig'},
  {file:'foreman_pig.png',name:'Capataz',type:'pig'},
  {file:'corporal_pig.png',name:'Cabo',type:'pig'},
];

const PATTERNS = [
  {type:'AB', rep:'A B', hint:'Alternado'},
  {type:'AAB', rep:'A A B', hint:'Dois de um, um do outro'},
  {type:'ABB', rep:'A B B', hint:'Um, depois dois do outro'},
  {type:'ABC', rep:'A B C', hint:'Três diferentes'},
  {type:'AABB', rep:'A A B B', hint:'Pares'},
  {type:'ABBA', rep:'A B B A', hint:'Espelho'},
  {type:'ABA', rep:'A B A', hint:'A volta sempre'},
];

let score=0,round=0,audioInit=false;
let sequence=[],fullSeq=[],seqPos=0,nextAnswer=null;
let totalRounds=10;

function initAudio(){
  if(audioInit)return;audioInit=true;
  try{new(window.AudioContext||window.webkitAudioContext)()}catch(e){}
}

function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='pt-PT';u.rate=0.85;u.pitch=0.9;
  window.speechSynthesis.speak(u);
}

function sfxCorrect(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='triangle';o.frequency.setValueAtTime(523,ac.currentTime);
    o.frequency.linearRampToValueAtTime(784,ac.currentTime+0.15);
    g.gain.setValueAtTime(0.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.2);
  }catch(e){}
}
function sfxWrong(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='square';o.frequency.value=180;g.gain.setValueAtTime(0.1,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.2);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.2);
  }catch(e){}
}
function sfxWin(){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='triangle';o.frequency.setValueAtTime(523,ac.currentTime);
    o.frequency.linearRampToValueAtTime(659,ac.currentTime+0.12);
    o.frequency.linearRampToValueAtTime(784,ac.currentTime+0.25);
    o.frequency.linearRampToValueAtTime(1047,ac.currentTime+0.4);
    g.gain.setValueAtTime(0.15,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.5);
    o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+0.5);
  }catch(e){}
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function confetti(){
  var c=document.createElement('div');c.className='confetti';
  document.querySelector('.game').appendChild(c);
  var colors=['#f1c40f','#e74c3c','#4ecca3','#3498db','#9b59b6'];
  for(var i=0;i<40;i++){
    var e=document.createElement('div');e.className='conf';
    e.style.left=Math.random()*100+'%';e.style.background=colors[Math.floor(Math.random()*colors.length)];
    e.style.width=(3+Math.random()*6)+'px';e.style.height=(3+Math.random()*6)+'px';
    e.style.animationDuration=(1.5+Math.random()*2)+'s';e.style.animationDelay=(Math.random()*1.5)+'s';
    c.appendChild(e);
  }
  setTimeout(function(){c.remove()},5000);
}

function startGame(){
  initAudio();
  document.getElementById('startOverlay').classList.add('hidden');
  score=0;round=0;
  document.getElementById('scoreDisplay').textContent='0 ✅';
  nextRound();
}

function nextRound(){
  if(round>=totalRounds){gameWin();return}
  
  var pType=PATTERNS[round%PATTERNS.length];
  var pool=shuffle([...ALL_CHARS]);
  var patternChars=pool.slice(0,pType.type.length);
  
  // Build the full sequence (show 3 full cycles)
  fullSeq=[];
  for(var i=0;i<3;i++){
    for(var j=0;j<pType.type.length;j++){
      var idx=pType.type.charCodeAt(j)-65;
      fullSeq.push(patternChars[idx]);
    }
  }
  
  // Show positions 0 through (showCount-1), then the rest are "what comes next?"
  var showCount=Math.max(3, pType.type.length+1);
  sequence=fullSeq.slice(0,showCount);
  seqPos=showCount;
  
  document.getElementById('patternLabel').textContent=pType.type+' = '+pType.rep+' ('+pType.hint+')';
  document.getElementById('roundDisplay').textContent='Ronda '+(round+1)+'/'+totalRounds;
  
  renderBoard();
  speak('Qual é o próximo?');
}

function renderBoard(){
  document.getElementById('feedback').textContent='';
  
  var row=document.getElementById('seqRow');
  row.innerHTML='';
  
  // Show revealed cards
  sequence.forEach(function(char,idx){
    var card=document.createElement('div');
    card.className='seq-card filled';
    var img=document.createElement('img');
    img.className='char-img';
    img.src='assets/'+char.file;
    card.appendChild(img);
    var label=document.createElement('div');
    label.className='idx-label';
    label.textContent=(idx+1);
    card.appendChild(label);
    row.appendChild(card);
  });
  
  // Show "next" card
  var nextCard=document.createElement('div');
  nextCard.className='seq-card next';
  nextCard.id='nextCard';
  var q=document.createElement('div');
  q.style.cssText='position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(28px,7vw,50px);color:#f1c40f;font-weight:700';
  q.textContent='?';
  nextCard.appendChild(q);
  var label=document.createElement('div');
  label.className='idx-label';
  label.textContent=(sequence.length+1);
  nextCard.appendChild(label);
  row.appendChild(nextCard);
  
  // Generate choices: 1 correct + 3 distractors
  nextAnswer=fullSeq[showCount];
  var found=nextAnswer;
  
  var choices=[found];
  var distractorPool=ALL_CHARS.filter(function(c){return c.file!==found.file});
  shuffle(distractorPool);
  while(choices.length<4 && distractorPool.length>0){
    choices.push(distractorPool.pop());
  }
  shuffle(choices);
  
  var choicesDiv=document.getElementById('choices');
  choicesDiv.innerHTML='';
  choices.forEach(function(char){
    var btn=document.createElement('div');
    btn.className='choice-btn';
    var img=document.createElement('img');
    img.className='char-img';
    img.src='assets/'+char.file;
    btn.appendChild(img);
    var name=document.createElement('div');
    name.className='ch-name';
    name.textContent=char.name;
    btn.appendChild(name);
    btn.addEventListener('click',function(){checkAnswer(this,char);});
    choicesDiv.appendChild(btn);
  });
}

function checkAnswer(el,char){
  if(el.disabled)return;
  
  // Disable all
  document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=true});
  
  if(char.file===nextAnswer.file){
    sfxCorrect();
    score++;
    document.getElementById('scoreDisplay').textContent=score+' ✅';
    el.classList.add('correct');
    
    // Add character to the sequence
    sequence.push(char);
    seqPos++;
    
    // Animate the next card filling
    var nc=document.getElementById('nextCard');
    if(nc){
      nc.classList.remove('next');
      nc.classList.add('filled','correct');
      nc.innerHTML='';
      var img=document.createElement('img');
      img.className='char-img';
      img.src='assets/'+char.file;
      nc.appendChild(img);
      var label=document.createElement('div');
      label.className='idx-label';
      label.textContent=sequence.length;
      nc.appendChild(label);
    }
    
    document.getElementById('feedback').textContent='✅ Correto!';
    document.getElementById('feedback').className='feedback ok';
    
    // Check if round is complete
    if(seqPos>=fullSeq.length){
      // Round complete!
      setTimeout(function(){
        round++;
        nextRound();
      },1500);
    }else{
      // More to guess
      setTimeout(function(){
        // Add new "next" card
        renderBoard();
      },1200);
    }
  }else{
    sfxWrong();
    el.classList.add('wrong');
    document.getElementById('feedback').textContent='❌ Tenta outra vez!';
    document.getElementById('feedback').className='feedback fail';
    
    // Re-enable after brief delay
    setTimeout(function(){
      el.classList.remove('wrong');
      document.querySelectorAll('.choice-btn').forEach(function(b){b.disabled=false});
    },800);
  }
}

function gameWin(){
  document.getElementById('winOverlay').classList.add('active');
  sfxWin();
  speak('Parabéns!');
  confetti();
}

function restartGame(){
  document.getElementById('winOverlay').classList.remove('active');
  startGame();
}
</script>
</body>
</html>
